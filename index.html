<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hachi+Maru+Pop&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="tablet-container">
  
  <header class="header-logo">
    <h1 id="store-logo"></h1>
  </header>

  <div id="custom-popup" style="display: none;">
    <div class="popup-content">
      <p id="popup-text"></p>
      <button class="choice-btn" id="popup-close-btn">わかった！</button>
    </div>
  </div>

  <div id="screen-size" class="screen active">
    <h2>1. チャーハンのサイズを選んでください</h2>
    <div class="button-grid" id="container-size"></div>
  </div>

  <div id="screen-spice" class="screen">
    <h2>2. チャーハンの種類を選んでください</h2>
    <div class="button-grid" id="container-spice"></div>
    <div class="footer-actions">
      <button class="back-btn" data-back-to="screen-size">◀ 戻る</button>
    </div>
  </div>

  <div id="screen-topping" class="screen">
    <h2>3. トッピングを選んでください</h2>
    <div class="topping-grid" id="container-topping"></div>
    <div class="footer-actions">
      <button class="back-btn" data-back-to="screen-spice">◀ 戻る</button>
      <button class="choice-btn skip-btn" id="btn-save-topping">決定して次へ</button>
    </div>
  </div>

  <div id="screen-side" class="screen">
    <h2>4. サイドメニューを選んでください</h2>
    <div class="topping-grid" id="container-side"></div>
    <div class="footer-actions">
      <button class="back-btn" data-back-to="screen-topping">◀ 戻る</button>
      <button class="choice-btn skip-btn" id="btn-save-side">決定して次へ</button>
    </div>
  </div>

  <div id="screen-confirm" class="screen">
    <h2>5. ご注文の確認</h2>
    <div class="confirm-list">
      <div class="confirm-item"><span>サイズ：</span><span id="summary-size" class="confirm-val"></span></div>
      <div class="confirm-item"><span>種類：</span><span id="summary-spice" class="confirm-val"></span></div>
      <div class="confirm-item"><span>トッピング：</span><span id="summary-topping" class="confirm-val"></span></div>
      <div class="confirm-item"><span>サイドメニュー：</span><span id="summary-side" class="confirm-val"></span></div>
    </div>
    <div class="footer-actions">
      <button class="back-btn" data-back-to="screen-side">◀ 戻る</button>
      <button class="choice-btn success-btn" id="btn-send-order">注文する</button>
    </div>
  </div>

</div>

<script src="js/menu-data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
